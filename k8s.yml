# iVolve Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: ivolve
---
# App Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ivolve-deployment
  namespace: ivolve
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ivolve
  template:
    metadata:
      labels:
        app: ivolve
    spec:
      containers:
        - name: ivolve
          image: emanzaki/cloud-devops
          ports:
            - containerPort: 5000
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: ivolve-service
  namespace: ivolve
spec:
  selector:
    app: ivolve
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: NodePort
